name: Publish to pub.dev

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dart-lang/setup-dart@v1

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve version from tag
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PUBSPEC=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          if [ "$PUBSPEC" != "$VERSION" ]; then
            echo "Version mismatch: pubspec.yaml=$PUBSPEC vs tag=$VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing traceway $VERSION"

      - name: Resolve release notes from CHANGELOG.md
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          awk -v ver="$VERSION" '
            /^## / {
              if (found) exit
              if ($2 == ver) { found=1; next }
            }
            found
          ' CHANGELOG.md > /tmp/release_notes.md
          if [ ! -s /tmp/release_notes.md ]; then
            echo "Release $VERSION" > /tmp/release_notes.md
          fi
          echo "--- Release notes ---"
          cat /tmp/release_notes.md

      - name: Install dependencies
        run: flutter pub get

      - name: Publish - dry run
        run: dart pub publish --dry-run

      - name: Publish to pub.dev
        run: dart pub publish --force

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          TAG="v$VERSION"
          PRERELEASE=""
          [[ "$VERSION" == *"-"* ]] && PRERELEASE="--prerelease"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file /tmp/release_notes.md
          else
            gh release create "$TAG" --title "$TAG" --notes-file /tmp/release_notes.md $PRERELEASE
          fi
